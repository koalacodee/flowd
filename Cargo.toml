[package]
name = "hash_mapper"
version = "0.1.0"
edition = "2024"

[features]
tokio = ["dep:tokio"]
async-std = ["dep:async-std", "dep:futures"]

[dependencies]
anyhow = "1.0.102"
tokio = { version = "1", optional = true, features = ["rt", "macros"] }
async-std = { version = "1", optional = true }
futures = { version = "0.3", optional = true }
# pulls in the proc-macro crate privately
hash_mapper_derive = { path = "./hash_mapper_derive" }
redis = { version = "1.1.0", features = ["tokio-comp", "streams"] }
